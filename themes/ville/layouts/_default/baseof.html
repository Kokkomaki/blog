<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
  <script>
    (function() {
      var stored = localStorage.getItem('theme');
      if (stored) {
        document.documentElement.dataset.theme = stored;
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.dataset.theme = 'dark';
      }
    })();
  </script>
</head>
<body>
  <header>
    {{ partial "header.html" . }}
  </header>
  <main data-pagefind-body>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    {{ partial "footer.html" . }}
  </footer>

  <div class="search-overlay" id="search-overlay">
    <div class="search-box">
      <div id="pagefind-search"></div>
    </div>
  </div>

  <script>
    (function() {
      var toggle = document.getElementById('search-toggle');
      var overlay = document.getElementById('search-overlay');
      var initialized = false;

      function openSearch() {
        overlay.classList.add('is-open');
        document.body.style.overflow = 'hidden';
        if (!initialized && typeof PagefindUI !== 'undefined') {
          new PagefindUI({ element: '#pagefind-search', showImages: false, resetStyles: false });
          initialized = true;
        }
        setTimeout(function() {
          var input = overlay.querySelector('input');
          if (input) input.focus();
        }, 50);
      }

      function closeSearch() {
        overlay.classList.remove('is-open');
        document.body.style.overflow = '';
      }

      if (toggle) toggle.addEventListener('click', openSearch);

      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) closeSearch();
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeSearch();
        if (e.key === '/' && !overlay.classList.contains('is-open') &&
            document.activeElement.tagName !== 'INPUT' &&
            document.activeElement.tagName !== 'TEXTAREA') {
          e.preventDefault();
          openSearch();
        }
      });
    })();
  </script>
</body>
</html>
